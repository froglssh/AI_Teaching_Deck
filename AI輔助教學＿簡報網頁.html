<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI輔助教學_實驗探究</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --ink:#1a1c20; --sub:#5b6068;
    --line:#e2e5ea; --accent:#2f6df6; --accent-soft:#e8f0ff;
    --imgbg:#eceef2; --shadow:0 6px 24px rgba(20,30,50,.10);
    --strip:#ffffff;
  }
  html[data-theme="dark"]{
    --bg:#0c0e12; --panel:#15181e; --ink:#f2f4f8; --sub:#a4acb8;
    --line:#262b34; --accent:#5b8cff; --accent-soft:#1b2740;
    --imgbg:#000000; --shadow:0 6px 28px rgba(0,0,0,.55);
    --strip:#12141a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang TC","Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
    background:var(--bg); color:var(--ink);
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
    transition:background .3s,color .3s;
  }

  /* ---------- Header ---------- */
  header{
    flex:0 0 auto; display:flex; align-items:center; gap:14px;
    padding:10px 20px; border-bottom:1px solid var(--line); background:var(--panel);
  }
  header .brand{display:flex;flex-direction:column;line-height:1.2}
  header h1{font-size:20px;font-weight:800;letter-spacing:.5px}
  header .brand small{color:var(--sub);font-size:12px;margin-top:2px}
  header .spacer{flex:1}
  .ctrl{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  button.tool{
    border:1px solid var(--line); background:var(--panel); color:var(--ink);
    border-radius:10px; padding:8px 12px; font-size:14px; cursor:pointer;
    display:inline-flex; align-items:center; gap:6px; transition:.15s;
  }
  button.tool:hover{border-color:var(--accent);color:var(--accent)}
  button.tool.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .sec-box{
    display:flex;align-items:center;gap:6px;border:1px solid var(--line);
    border-radius:10px;padding:5px 10px;font-size:13px;color:var(--sub);
  }
  .sec-box input{
    width:48px;text-align:center;border:none;background:transparent;color:var(--ink);
    font-size:15px;font-weight:700;outline:none;
  }
  .sec-box select{
    border:none;background:transparent;color:var(--ink);font-size:13px;font-weight:700;
    outline:none;cursor:pointer;max-width:160px;
  }
  .sec-box select option{color:#111}
  .chk{
    display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--sub);
    border:1px solid var(--line);border-radius:10px;padding:6px 10px;cursor:pointer;user-select:none;
  }
  .chk input{width:15px;height:15px;accent-color:var(--accent);cursor:pointer}
  .playing-badge{
    position:absolute;top:16px;left:16px;background:rgba(47,109,246,.9);color:#fff;
    padding:5px 13px;border-radius:20px;font-size:13px;font-weight:700;z-index:6;display:none;
  }
  .playing-badge.show{display:block}

  /* ---------- Stage (two panels) ---------- */
  .stage{
    flex:1 1 auto; display:flex; gap:0; min-height:0; position:relative;
    touch-action:pan-y;
  }
  .panel-img{
    flex:2 1 0; min-width:0; background:var(--imgbg);
    display:flex; align-items:center; justify-content:center; padding:22px;
    position:relative;
  }
  .panel-img img{
    max-width:100%; max-height:100%; object-fit:contain;
    border-radius:6px; box-shadow:var(--shadow); background:#fff;
    user-select:none; -webkit-user-drag:none;
  }
  .panel-txt{
    flex:1 1 0; min-width:300px; max-width:38%; background:var(--panel);
    border-left:1px solid var(--line); display:flex; flex-direction:column;
    padding:26px 28px; min-height:0;
  }
  .panel-txt .pageno{
    font-size:13px; font-weight:700; color:var(--accent);
    letter-spacing:1px; text-transform:uppercase; margin-bottom:6px;
  }
  .panel-txt h2{
    font-size:22px; font-weight:800; line-height:1.3; margin-bottom:14px;
    padding-bottom:12px; border-bottom:2px solid var(--accent-soft);
  }
  .panel-txt .narr{
    flex:1 1 auto; min-height:0; overflow:hidden;
    display:flex; align-items:flex-start;
  }
  .panel-txt .narr p{
    font-size:21px; line-height:1.72; letter-spacing:.2px; color:var(--ink);
    text-align:justify;
  }

  /* nav arrows over the image */
  .arrow{
    position:absolute; top:50%; transform:translateY(-50%);
    width:46px;height:46px;border-radius:50%; border:none; cursor:pointer;
    background:rgba(0,0,0,.4); color:#fff; font-size:22px; line-height:1;
    display:flex;align-items:center;justify-content:center; opacity:.55; transition:.15s;
  }
  .arrow:hover{opacity:1;background:var(--accent)}
  .arrow.prev{left:14px} .arrow.next{right:14px}

  /* ---------- Filmstrip ---------- */
  .filmstrip{
    flex:0 0 auto; background:var(--strip); border-top:1px solid var(--line);
    display:flex; gap:8px; padding:8px 12px; overflow-x:auto; overflow-y:hidden;
    scroll-behavior:smooth;
  }
  .filmstrip::-webkit-scrollbar{height:8px}
  .filmstrip::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}
  .thumb{
    flex:0 0 auto; width:104px; height:60px; border-radius:6px; overflow:hidden;
    border:2px solid transparent; cursor:pointer; position:relative; background:var(--imgbg);
  }
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .tn{
    position:absolute; left:0; bottom:0; background:rgba(0,0,0,.6); color:#fff;
    font-size:10px; padding:1px 5px; border-top-right-radius:5px;
  }
  .thumb.active{border-color:var(--accent)}
  .thumb.active .tn{background:var(--accent)}

  /* ---------- Footer ---------- */
  footer{
    flex:0 0 auto; display:flex; align-items:center; gap:16px;
    padding:8px 20px; border-top:1px solid var(--line); background:var(--panel);
    font-size:13px; color:var(--sub);
  }
  footer .who{font-weight:700;color:var(--ink)}
  footer .spacer{flex:1}
  .progress{flex:1 1 auto;height:6px;background:var(--line);border-radius:6px;overflow:hidden;max-width:340px}
  .progress > i{display:block;height:100%;width:0;background:var(--accent);transition:width .3s}
  .counter{font-variant-numeric:tabular-nums;font-weight:700;color:var(--ink)}

  /* ---------- Fullscreen play overlay ---------- */
  .fs{
    position:fixed; inset:0; background:#000; z-index:999;
    display:none; align-items:center; justify-content:center;
  }
  .fs.on{display:flex}
  .fs img{max-width:100%;max-height:100%;object-fit:contain}
  .fs .fsbar{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:14px;
    background:rgba(255,255,255,.10); backdrop-filter:blur(8px);
    padding:9px 16px; border-radius:40px; color:#fff; opacity:.15; transition:.25s;
  }
  .fs:hover .fsbar{opacity:1}
  .fs .fsbar button{
    background:transparent;border:none;color:#fff;font-size:20px;cursor:pointer;
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  .fs .fsbar button:hover{background:rgba(255,255,255,.2)}
  .fs .fscount{font-size:14px;font-variant-numeric:tabular-nums;min-width:66px;text-align:center}
  .fs .fssec{display:flex;align-items:center;gap:5px;font-size:13px;opacity:.85}
  .fs .fssec input{width:44px;text-align:center;border:none;border-radius:6px;padding:3px;font-weight:700}

  @media (max-width:820px){
    .panel-txt{max-width:44%;min-width:220px;padding:16px}
    .panel-txt .narr p{font-size:16px;line-height:1.6}
    .panel-txt h2{font-size:17px}
    header h1{font-size:16px}
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>AI輔助教學_實驗探究</h1>
      <small>臺北市立麗山高中　林獻升老師</small>
    </div>
    <div class="spacer"></div>
    <div class="ctrl">
      <button class="tool" id="autoBtn" title="自動播放（圖文檢視）">▶ 自動播放</button>
      <div class="sec-box" title="每頁停留秒數">
        每頁 <input id="secInput" type="number" min="1" max="120" value="8"> 秒
      </div>
      <label class="chk" title="開啟後，自動播放會唸完整頁旁白才換頁；關閉則依上方秒數換頁">
        <input type="checkbox" id="waitSpeak" checked> 朗讀完才換頁
      </label>
      <div class="sec-box" title="選擇朗讀語音（清單依電腦已安裝的語音而定，建議選「Google」語音最自然）">
        語音 <select id="voiceSel"></select>
      </div>
      <div class="sec-box" title="朗讀語速">
        語速 <input id="rateIn" type="number" min="0.5" max="2" step="0.05" value="0.95" style="width:44px"> ×
      </div>
      <div class="sec-box" title="朗讀音調">
        音調 <input id="pitchIn" type="number" min="0.5" max="1.5" step="0.05" value="1.0" style="width:44px"> ♪
      </div>
      <button class="tool" id="speakBtn" title="朗讀目前這一頁的旁白">🔊 朗讀旁白</button>
      <button class="tool" id="fsBtn" title="全螢幕播放（僅簡報畫面）">⛶ 全螢幕播放</button>
      <button class="tool" id="themeBtn" title="切換背景">🌙 深色</button>
    </div>
  </header>

  <div class="stage" id="stage">
    <div class="panel-img">
      <div class="playing-badge" id="badge">播放中…</div>
      <button class="arrow prev" id="prevBtn" aria-label="上一頁">‹</button>
      <img id="slideImg" src="" alt="投影片">
      <button class="arrow next" id="nextBtn" aria-label="下一頁">›</button>
    </div>
    <div class="panel-txt">
      <div class="pageno" id="pageno">第 1 / 147 頁</div>
      <h2 id="slideTitle">—</h2>
      <div class="narr"><p id="narrText">—</p></div>
    </div>
  </div>

  <div class="filmstrip" id="filmstrip"></div>

  <footer>
    <span class="who">臺北市立麗山高中　林獻升老師</span>
    <span>·　AI 人工智慧輔助 IA 智能增強（教學篇）</span>
    <div class="spacer"></div>
    <div class="progress"><i id="progBar"></i></div>
    <span class="counter" id="counter">1 / 147</span>
  </footer>

  <!-- Fullscreen play overlay (image only) -->
  <div class="fs" id="fsOverlay">
    <img id="fsImg" src="" alt="投影片">
    <div class="fsbar">
      <button id="fsPrev" title="上一頁">‹</button>
      <button id="fsPlay" title="播放/暫停">⏸</button>
      <button id="fsSpeak" title="朗讀旁白">🔊</button>
      <button id="fsNext" title="下一頁">›</button>
      <span class="fscount" id="fsCount">1 / 147</span>
      <span class="fssec">秒數 <input id="fsSec" type="number" min="1" max="120" value="8"></span>
      <button id="fsExit" title="離開全螢幕">✕</button>
    </div>
  </div>

<script src="deck_data.js"></script>
<script>
(function(){
  const S = window.SLIDES || [];
  const TOTAL = S.length;
  const pad = n => String(n).padStart(2,'0');
  const imgSrc = n => "origin_image/slide_" + pad(n) + ".png";

  let idx = 0;              // 0-based index into S array (display order = file order 1..147)
  let autoTimer = null;     // 秒數計時模式用
  let fsOpen = false;

  // ---- 旁白朗讀狀態 ----
  let narrating=false, zhVoice=null, allVoices=[], advanceTimer=null, speakGen=0;
  const synth = window.speechSynthesis;
  const badge = document.getElementById('badge');

  // elements
  const slideImg=document.getElementById('slideImg');
  const slideTitle=document.getElementById('slideTitle');
  const narrText=document.getElementById('narrText');
  const pageno=document.getElementById('pageno');
  const counter=document.getElementById('counter');
  const progBar=document.getElementById('progBar');
  const narrBox=narrText.parentElement;
  const filmstrip=document.getElementById('filmstrip');

  // build filmstrip
  const thumbs=[];
  S.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='thumb'; d.dataset.i=i;
    d.innerHTML='<img loading="lazy" src="'+imgSrc(s.n)+'"><span class="tn">'+s.n+'</span>';
    d.addEventListener('click',()=>go(i));
    filmstrip.appendChild(d); thumbs.push(d);
  });

  // auto-fit narration font so it fills but never overflows the box
  function fitText(){
    const p=narrText;
    let size=22;                 // start large
    p.style.fontSize=size+'px';
    const maxH=narrBox.clientHeight;
    // shrink until it fits (min 13px)
    while(p.scrollHeight>maxH && size>13){ size-=1; p.style.fontSize=size+'px'; }
    // grow a touch if lots of room and short text (max 24px)
    while(p.scrollHeight<maxH-4 && size<24){ size+=1; p.style.fontSize=size+'px';
      if(p.scrollHeight>maxH){ size-=1; p.style.fontSize=size+'px'; break; } }
  }

  function render(){
    const s=S[idx];
    slideImg.src=imgSrc(s.n);
    slideTitle.textContent=s.title||('第 '+s.n+' 頁');
    narrText.textContent=s.text||'';
    pageno.textContent='第 '+(idx+1)+' / '+TOTAL+' 頁　·　slide '+s.n;
    counter.textContent=(idx+1)+' / '+TOTAL;
    progBar.style.width=((idx+1)/TOTAL*100)+'%';
    thumbs.forEach((t,i)=>t.classList.toggle('active',i===idx));
    const at=thumbs[idx];
    if(at) at.scrollIntoView({inline:'center',block:'nearest'});
    if(fsOpen){ fsImg.src=imgSrc(s.n); fsCount.textContent=(idx+1)+' / '+TOTAL; }
    requestAnimationFrame(fitText);
  }

  function go(i){ idx=(i%TOTAL+TOTAL)%TOTAL; render(); if(narrating) speakCurrent(); }
  function next(){ go(idx+1); }
  function prev(){ go(idx-1); }

  // ---- 語音朗讀（Web Speech API，離線可用）----
  function voiceScore(v){
    const n=(v.name||'')+' '+(v.voiceURI||''); let s=0;
    if(/zh[-_]TW|zh[-_]Hant|cmn/i.test(v.lang)) s+=40;
    else if(/^zh|zh[-_]CN|zh[-_]HK/i.test(v.lang)) s+=20;
    if(/google/i.test(n)) s+=30;
    if(/enhanced|premium|加強|進階|neural|natural/i.test(n)) s+=25;
    if(/siri/i.test(n)) s+=20;
    if(/美嘉|meijia|台湾|臺灣|taiwan/i.test(n)) s+=10;
    return s;
  }
  const voiceSel=document.getElementById('voiceSel');
  function buildVoiceList(){
    if(!synth) return;
    allVoices=synth.getVoices();
    const gtw=allVoices.filter(v=>/google/i.test(v.name) && /zh[-_]TW|zh[-_]Hant|國語|臺灣|台灣/i.test((v.name||'')+' '+v.lang));
    voiceSel.innerHTML='';
    if(gtw.length){
      gtw.forEach(v=>{
        const o=document.createElement('option');
        o.value=allVoices.indexOf(v);
        o.textContent=v.name+' ('+v.lang+') ✨線上';
        voiceSel.appendChild(o);
      });
      voiceSel.value=allVoices.indexOf(gtw[0]); zhVoice=gtw[0];
    }else{
      const o=document.createElement('option');
      o.value=''; o.textContent='找不到 Google 國語（臺灣）— 請用 Chrome 並連網';
      voiceSel.appendChild(o); zhVoice=null;
    }
  }
  if(synth){
    buildVoiceList();
    synth.onvoiceschanged=buildVoiceList;
    voiceSel.addEventListener('change',()=>{
      zhVoice=allVoices[parseInt(voiceSel.value)]||null;
      if(narrating) speakCurrent();
    });
  }
  const rateIn=document.getElementById('rateIn');
  const pitchIn=document.getElementById('pitchIn');
  function buildChunks(s){
    const out=[];
    [s.title, s.text].forEach(t=>{
      (t||'').split(/(?<=[。！？!?；;：])/).forEach(p=>{ p=p.trim(); if(p) out.push(p); });
    });
    return out;
  }
  function speakCurrent(){
    if(!synth){ alert('您的瀏覽器不支援語音朗讀，請改用 Chrome 或 Edge。'); return; }
    const gen=++speakGen;
    synth.cancel(); clearTimeout(advanceTimer);
    const chunks=buildChunks(S[idx]);
    const rate=Math.min(2,Math.max(0.5,parseFloat(rateIn.value)||0.95));
    const pitch=Math.min(1.5,Math.max(0.5,parseFloat(pitchIn.value)||1));
    let i=0;
    (function step(){
      if(gen!==speakGen) return;
      if(i>=chunks.length){
        if(narrating && idx<TOTAL-1){ advanceTimer=setTimeout(()=>{ if(narrating && gen===speakGen) go(idx+1); },900); }
        else if(narrating){ stopPlay(); }
        return;
      }
      const u=new SpeechSynthesisUtterance(chunks[i]);
      u.lang='zh-TW'; if(zhVoice) u.voice=zhVoice; u.rate=rate; u.pitch=pitch;
      u.onend=()=>{ if(gen!==speakGen) return; i++;
        const gap = /[。！？!?]$/.test(chunks[i-1]) ? 260 : 90;
        setTimeout(()=>{ if(gen===speakGen) step(); }, gap);
      };
      u.onerror=()=>{};
      synth.speak(u);
    })();
  }

  // ---- 統一播放控制 ----
  // 勾選「朗讀完才換頁」→ 由旁白驅動，唸完整頁才換頁；不勾 → 依秒數固定換頁（無旁白）
  const secInput=document.getElementById('secInput');
  const autoBtn=document.getElementById('autoBtn');
  const speakBtn=document.getElementById('speakBtn');
  const waitSpeak=document.getElementById('waitSpeak');
  function secMs(){ let v=parseFloat(secInput.value)||8; if(v<1)v=1; return v*1000; }
  function isPlaying(){ return !!autoTimer || narrating; }
  function uiReset(){
    autoBtn.classList.remove('active'); autoBtn.textContent='▶ 自動播放';
    speakBtn.classList.remove('active'); speakBtn.textContent='🔊 朗讀旁白';
    fsPlayBtn.textContent='▶'; fsSpeakBtn.textContent='🔊';
    badge.classList.remove('show');
  }
  function stopPlay(){
    clearInterval(autoTimer); autoTimer=null;
    narrating=false; if(synth) synth.cancel(); clearTimeout(advanceTimer);
    uiReset();
  }
  function startTimer(){
    stopPlay(); autoTimer=setInterval(next,secMs());
    autoBtn.classList.add('active'); autoBtn.textContent='⏸ 停止播放';
    fsPlayBtn.textContent='⏸';
    badge.textContent='自動播放中…'; badge.classList.add('show');
  }
  function startNarrate(){
    stopPlay(); narrating=true;
    autoBtn.classList.add('active'); autoBtn.textContent='⏸ 停止播放';
    speakBtn.classList.add('active'); speakBtn.textContent='⏹ 停止朗讀';
    fsPlayBtn.textContent='⏸'; fsSpeakBtn.textContent='⏹';
    badge.textContent='旁白朗讀中…'; badge.classList.add('show');
    speakCurrent();
  }
  function startPlay(){ waitSpeak.checked ? startNarrate() : startTimer(); }
  function togglePlay(){ isPlaying()?stopPlay():startPlay(); }

  autoBtn.addEventListener('click',togglePlay);
  speakBtn.addEventListener('click',()=>{ narrating?stopPlay():startNarrate(); });
  secInput.addEventListener('change',()=>{ if(autoTimer) startTimer(); fsSec.value=secInput.value; });
  rateIn.addEventListener('change',()=>{ if(narrating) speakCurrent(); });
  pitchIn.addEventListener('change',()=>{ if(narrating) speakCurrent(); });

  // ---- theme ----
  const themeBtn=document.getElementById('themeBtn');
  themeBtn.addEventListener('click',()=>{
    const dark=document.documentElement.getAttribute('data-theme')==='dark';
    document.documentElement.setAttribute('data-theme',dark?'light':'dark');
    themeBtn.textContent=dark?'🌙 深色':'☀ 淺色';
    requestAnimationFrame(fitText);
  });

  // ---- fullscreen play (image only) ----
  const fsOverlay=document.getElementById('fsOverlay');
  const fsImg=document.getElementById('fsImg');
  const fsCount=document.getElementById('fsCount');
  const fsSec=document.getElementById('fsSec');
  const fsPlayBtn=document.getElementById('fsPlay');
  const fsSpeakBtn=document.getElementById('fsSpeak');
  function openFs(){
    fsOpen=true; fsOverlay.classList.add('on'); fsImg.src=imgSrc(S[idx].n);
    fsCount.textContent=(idx+1)+' / '+TOTAL; fsSec.value=secInput.value;
    if(fsOverlay.requestFullscreen) fsOverlay.requestFullscreen().catch(()=>{});
    if(!isPlaying()) startPlay();
  }
  function closeFs(){
    fsOpen=false; fsOverlay.classList.remove('on');
    if(document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    stopPlay(); render();
  }
  document.getElementById('fsBtn').addEventListener('click',openFs);
  document.getElementById('fsExit').addEventListener('click',closeFs);
  document.getElementById('fsPrev').addEventListener('click',prev);
  document.getElementById('fsNext').addEventListener('click',next);
  fsPlayBtn.addEventListener('click',togglePlay);
  fsSpeakBtn.addEventListener('click',()=>{ narrating?stopPlay():startNarrate(); });
  fsSec.addEventListener('change',()=>{ secInput.value=fsSec.value; if(autoTimer) startTimer(); });
  document.addEventListener('fullscreenchange',()=>{ if(!document.fullscreenElement&&fsOpen) closeFs(); });

  // ---- nav buttons ----
  document.getElementById('nextBtn').addEventListener('click',next);
  document.getElementById('prevBtn').addEventListener('click',prev);

  // ---- keyboard ----
  document.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT') return;
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){ e.preventDefault(); prev(); }
    else if(e.key==='Home'){ go(0); }
    else if(e.key==='End'){ go(TOTAL-1); }
    else if(e.key==='Escape'&&fsOpen){ closeFs(); }
    else if(e.key.toLowerCase()==='f'&&!fsOpen){ openFs(); }
  });

  // ---- swipe / drag on stage ----
  function bindSwipe(el){
    let x0=null,y0=null,active=false;
    const start=(x,y)=>{x0=x;y0=y;active=true;};
    const end=(x,y)=>{
      if(!active||x0===null)return; active=false;
      const dx=x-x0, dy=y-y0;
      if(Math.abs(dx)>60 && Math.abs(dx)>Math.abs(dy)){ dx<0?next():prev(); }
    };
    el.addEventListener('touchstart',e=>start(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
    el.addEventListener('touchend',e=>end(e.changedTouches[0].clientX,e.changedTouches[0].clientY),{passive:true});
    let md=false;
    el.addEventListener('mousedown',e=>{ if(e.target.closest('.arrow'))return; md=true; start(e.clientX,e.clientY); });
    window.addEventListener('mouseup',e=>{ if(md){ md=false; end(e.clientX,e.clientY);} });
  }
  bindSwipe(document.getElementById('stage'));
  bindSwipe(fsOverlay);

  window.addEventListener('resize',()=>requestAnimationFrame(fitText));
  window.addEventListener('beforeunload',()=>{ if(synth) synth.cancel(); });

  // init
  render();
})();
</script>
</body>
</html>
